title: Dockward
description: Auto-deploy and auto-heal agent for self-hosted Docker containers.
base_url: https://studiowebux.github.io/dockward
author: Studio Webux
theme: default
dark_mode: true
enable_search: true
enable_llms: true

changelog:
  enabled: true
  title: "Changelog"
  path: "changelog"
  rss_enabled: true
  repository: "https://github.com/studiowebux/dockward"

stale_warning:
  enabled: true
  threshold_days: 365
  show_update_date: true

social_links:
  - name: GitHub
    url: https://github.com/studiowebux/dockward
    icon: github
  - name: Discord
    url: https://discord.gg/BG5Erm9fNv
    icon: discord

footer:
  copyright: "2026 Studio Webux. AGPL-3.0 License."
  links:
    - title: "Project"
      items:
        - text: "GitHub"
          url: "https://github.com/studiowebux/dockward"
        - text: "Issues"
          url: "https://github.com/studiowebux/dockward/issues"
        - text: "Releases"
          url: "https://github.com/studiowebux/dockward/releases"
    - title: "Community"
      items:
        - text: "Discord"
          url: "https://discord.gg/BG5Erm9fNv"
        - text: "Buy Me a Coffee"
          url: "https://buymeacoffee.com/studiowebux"

