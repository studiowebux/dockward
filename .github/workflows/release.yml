name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - run: go vet ./...

      - run: go test ./...

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build linux/amd64
        run: GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.tag.outputs.name }}" -o dockward-linux-amd64 ./cmd/dockward/

      - name: Build darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=${{ steps.tag.outputs.name }}" -o dockward-darwin-arm64 ./cmd/dockward/

      - name: Build linux/arm64
        run: GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version=${{ steps.tag.outputs.name }}" -o dockward-linux-arm64 ./cmd/dockward/

      - name: Create or update GitHub Release
        run: |
          gh release create ${{ steps.tag.outputs.name }} \
            dockward-linux-amd64 dockward-darwin-arm64 dockward-linux-arm64 \
            --generate-notes 2>/dev/null || \
          gh release upload ${{ steps.tag.outputs.name }} \
            dockward-linux-amd64 dockward-darwin-arm64 dockward-linux-arm64 \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
